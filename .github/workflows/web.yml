name: Web (wasm build + Pages deploy)

# Cloudflare Pages build images do not ship Rust, so the wasm is prebuilt here
# and only the static `web/dist` (assets + Pages Functions) is shipped. No game
# files are ever produced or bundled by this workflow.

on:
  push:
    # feat/ux-redesign is included so its push produces a Pages *preview*
    # deployment (feat-ux-redesign.wie-web.pages.dev) for the user to review
    # before any merge.
    branches: [main, feat/cf-web-service, feat/ux-redesign]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  deployments: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    # Job-level env so the deploy step's `if:` can see it (step-level env is NOT
    # available in that same step's `if:`). The token itself is never printed.
    env:
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-web-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-web-wasm-

      - name: Install wasm-bindgen-cli (pinned to the wasm-bindgen crate version)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.108

      # The apt `binaryen` is too old and fails to parse modern wasm. Pull a
      # recent release so `wasm-opt -Oz` works (build-wasm.sh falls back to the
      # unoptimized bundle if this is ever unavailable).
      - name: Install binaryen (wasm-opt)
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" | tar xz
          echo "$PWD/binaryen-${VER}/bin" >> "$GITHUB_PATH"

      # `npm run build` runs scripts/build-wasm.sh (cargo + wasm-bindgen +
      # wasm-opt → web/src/wasm), then `tsc -b` and `vite build` → web/dist.
      - name: Build frontend (wasm + React/Vite)
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: wie-web-dist
          path: web/dist

      # Apply D1 migrations to the REMOTE prod DB BEFORE deploying, so the live
      # schema always matches the new code (no schema-mismatch window). Requires
      # CLOUDFLARE_API_TOKEN to carry D1 Edit (in addition to Pages Edit). The
      # token is referenced from secrets, never echoed/embedded (S3). Idempotent:
      # wrangler skips already-applied migrations, so this is a no-op when nothing
      # is new. Gated to `main` only — migrations touch the single shared prod DB
      # and must be deliberate (preview branches rely on graceful fallbacks).
      #
      # ★DESTRUCTIVE-AUTO-APPLY POLICY: migrations are applied automatically even
      # when they contain destructive statements (DROP TABLE / DELETE FROM /
      # TRUNCATE) — the service is pre-launch and migrations are authored
      # deliberately. Documented in docs/CLOUDFLARE_SETUP.md.
      - name: Apply D1 migrations (remote, main only)
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' && env.HAS_CF_TOKEN == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.104.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply wie-db --remote

      # Direct-Upload deploy on push only (not PRs). Gated on the token being
      # present (S3/S8 — secrets are referenced, never embedded). functions/ at
      # the repo root is uploaded alongside the static assets. main → production,
      # other branches → preview deployment.
      - name: Deploy to Cloudflare Pages
        if: ${{ github.event_name == 'push' && env.HAS_CF_TOKEN == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.104.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=wie-web --branch=${{ github.ref_name }}
