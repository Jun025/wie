# Cloudflare Pages configuration for the wie web service.
#
# The React/Vite frontend builds to `web/dist` (its Vite `outDir`). The backend
# lives in `functions/` (Pages Functions) and talks to D1 via the `DB` binding.
#
# SECRETS ARE NOT STORED HERE (S3). The session signing key is a Pages *secret*
# named SESSION_SECRET, never committed. The D1 `database_id` below is NOT a
# secret — it is the public database identifier and is safe to commit.

name = "wie-web"
compatibility_date = "2024-09-23"
pages_build_output_dir = "web/dist"

# D1 binding. The dashboard binding (Pages → Settings → Functions → D1) is the
# binding actually used at runtime; this entry keeps `wrangler` CLI commands
# (d1 migrations apply, pages dev) pointed at the same database.
[[d1_databases]]
binding = "DB"
database_name = "wie-db"
database_id = "a016e967-2bc3-4eb3-9204-706c812d4aa9"

# R2 binding for the logged-in user's PRIVATE game-file vault (B안). Bytes live in
# R2; metadata in D1 (user_files). Declared here (like the D1 binding above)
# because this Pages project's bindings are wrangler.toml-managed — the dashboard
# R2 binding is locked ("managed by wrangler.toml"). The `wie-data` bucket already
# exists (created by the user, Public access OFF), so this declaration is safe:
# `wrangler pages deploy` validates the block and the bucket is present. (If the
# bucket were absent, this block would FAIL the whole deploy — that earlier bit us.)
#
# The code references only the GAMES *binding* (`env.GAMES`), never the bucket
# name, so the bucket can be renamed without any code change. filesEnabled() =
# !!env.GAMES, so this binding flips the feature from dormant to active. The
# binding applies to BOTH Production and Preview (same as the single D1 binding).
#
# The bucket MUST stay PRIVATE: no public bucket URL, no custom domain, no public
# access. Bytes are only ever served by the owner-checked /api/files/:id endpoint.
[[r2_buckets]]
binding = "GAMES"
bucket_name = "wie-data"
