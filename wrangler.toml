# Cloudflare Pages configuration for the wie web service.
#
# The React/Vite frontend builds to `web/dist` (its Vite `outDir`). The backend
# lives in `functions/` (Pages Functions) and talks to D1 via the `DB` binding.
#
# SECRETS / IDS ARE NOT STORED HERE (S3). `database_id` is filled in by the user
# after they create the D1 database (see docs/CLOUDFLARE_SETUP.md). The session
# signing key is a Pages *secret* named SESSION_SECRET, never committed.

name = "wie-web"
compatibility_date = "2024-09-23"
pages_build_output_dir = "web/dist"

# D1 binding. `database_id` is intentionally a placeholder — replace it with the
# id printed by `wrangler d1 create wie-db`, or bind it in the Pages dashboard.
[[d1_databases]]
binding = "DB"
database_name = "wie-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
